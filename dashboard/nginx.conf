server {
    listen 3000;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    location /api/ingestion/ {
        proxy_pass http://ingestion-gateway:8000/;
    }
    location /api/airlock/ {
        proxy_pass http://semantic-airlock:8000/;
    }
    location /api/beliefs/ {
        proxy_pass http://belief-state-engine:8000/;
    }
    location /api/solver/ {
        proxy_pass http://solver-engine:8000/;
    }
}
