    <circle cx="0" cy="0" r="13" fill="#3aa8c1"/>
    <circle cx="0" cy="0" r="7"  fill="#2a8aaa"/>
  </g>

  <!-- === RECHTHOEKIGE KADER === -->
  <rect x="64" y="88" width="152" height="148" rx="6" ry="6"
