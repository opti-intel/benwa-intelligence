  <rect x="161" y="202" width="5" height="5" fill="#1e3f6e" opacity="0.5"/>
  <rect x="172" y="184" width="18" height="42" rx="2" fill="#6a90b0"/>
  <rect x="176" y="188" width="4" height="4" fill="#1e3f6e" opacity="0.5"/>
  <rect x="183" y="188" width="4" height="4" fill="#1e3f6e" opacity="0.5"/>
  <rect x="176" y="197" width="4" height="4" fill="#1e3f6e" opacity="0.5"/>
