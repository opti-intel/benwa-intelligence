<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" width="280" height="300">
  <!-- Witte achtergrond voor standalone gebruik -->
  <rect width="280" height="300" fill="white"/>

  <!-- === GROTE netwerk-node BOVEN de kader === -->
